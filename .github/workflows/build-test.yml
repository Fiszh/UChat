name: Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

  dev:
    name: Dev server starts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Start dev server and check it responds
        run: |
          bun run dev &
          DEV_PID=$!
          echo "Waiting for dev server..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Dev server is up!"
              kill $DEV_PID
              exit 0
            fi
            sleep 1
          done
          echo "Dev server did not start in time"
          kill $DEV_PID
          exit 1
