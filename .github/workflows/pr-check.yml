name: PR Checklist Check
on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: write
  issues: write

jobs:
  check-checklist:
    runs-on: ubuntu-latest
    if: github.actor != 'app/dependabot'
    steps:
      - name: Check required boxes
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const count = (body.match(/\[x\]/gi) || []).length;
            if (count < 2) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: 'This PR has been automatically closed because the required checklist items were not checked. Please read [CONTRIBUTING.md](../CONTRIBUTING.md) before opening a new PR.'
              });
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                state: 'closed'
              });
              core.setFailed('PR closed: required checklist items not checked.');
            }
